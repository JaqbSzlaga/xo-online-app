<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <title>XO Chaos Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="XO Online" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="/static/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <link rel="icon" href="/static/icon-192.png" />

    <link rel="stylesheet" href="/static/style.css?v=31.0" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div class="bg-symbols" id="bgSymbols"></div>

    <main class="app">
        <header class="topbar">
            <div class="score">X: <span id="scoreX">0</span></div>
            <button id="langBtn" class="small-btn">ENG</button>
            <div class="score">O: <span id="scoreO">0</span></div>
        </header>

        <section id="menuView" class="card">
            <h1 id="title">KÓŁKO I KRZYŻYK ONLINE</h1>

            <div class="settings-row">
                <label id="playModeLabel">Tryb gry</label>
                <select id="playMode">
                    <option value="online">Online 1v1</option>
                    <option value="local">Lokalnie 1v1</option>
                    <option value="bot">Gra z botem</option>
                </select>
            </div>

            <div class="settings-row">
                <label id="versionModeLabel">Wersja gry</label>
                <select id="versionMode">
                    <option value="classic">Classic</option>
                    <option value="student">Studencki</option>
                </select>
            </div>

            <div class="settings-row">
                <label id="matchModeLabel">Tryb meczu</label>
                <select id="targetScore">
                    <option value="0">Bez limitu</option>
                    <option value="3">Do 3 wygranych</option>
                    <option value="5">Do 5 wygranych</option>
                </select>
            </div>

            <label class="checkbox-row">
                <input type="checkbox" id="alternateStarter" checked />
                <span id="alternateLabel">Zmieniaj zaczynającego</span>
            </label>

            <label class="checkbox-row">
                <input type="checkbox" id="suddenDeath" />
                <span id="suddenDeathLabel">Nagła śmierć</span>
            </label>

            <div id="suddenDeathOptions" class="settings-row hidden">
                <label id="moveTimeLabel">Czas na ruch</label>
                <select id="moveTimeLimit">
                    <option value="5">5 sekund</option>
                    <option value="10" selected>10 sekund</option>
                    <option value="15">15 sekund</option>
                </select>
            </div>

            <div id="studentExtraOptions" class="student-extra hidden">
                <label class="checkbox-row">
                    <input type="checkbox" id="chaosMode" />
                    <span id="chaosModeLabel">Tryb Chaos</span>
                </label>

                <div id="chaosOptions" class="settings-row hidden">
                    <label id="chaosVariantLabel">Wariant chaosu</label>
                    <select id="chaosVariant">
                        <option value="hidden">Chaos ukryty</option>
                        <option value="warned" selected>Chaos ostrzegany</option>
                        <option value="brutal">Chaos brutalny</option>
                    </select>

                    <p id="chaosBrutalInfo" class="option-note hidden">
                        Brutalny chaos działa naprzemiennie: zamiana plansz i usunięcie jednego symbolu.
                    </p>
                    <input type="checkbox" id="chaosSymbolDecay" class="hidden" checked />
                </div>

                <label class="checkbox-row">
                    <input type="checkbox" id="firstBloodMode" />
                    <span id="firstBloodModeLabel">Pierwsza krew</span>
                </label>
            </div>

            <button id="createRoomBtn" class="main-btn">Utwórz pokój</button>

            <div class="join-box">
                <input id="roomCodeInput" placeholder="Kod pokoju" maxlength="8" />
                <button id="joinRoomBtn" class="main-btn secondary">Dołącz</button>
            </div>

            <button id="instructionsBtn" class="text-btn">Instrukcja</button>
        </section>

        <section id="instructionsView" class="card hidden">
            <h2 id="rulesTitle">INSTRUKCJA</h2>
            <div id="rulesText" class="rules"></div>
            <button id="backFromInstructionsBtn" class="main-btn secondary">Wróć</button>
        </section>

        <section id="gameView" class="card hidden">
            <div class="room-row">
                <div>
                    <span id="roomLabel">Pokój:</span>
                    <strong id="roomCode">---</strong>
                </div>
                <div class="game-actions">
                    <button id="gameHelpBtn" class="small-btn help-btn" title="Instrukcja">?</button>
                    <button id="copyLinkBtn" class="small-btn">Kopiuj link</button>
                </div>
            </div>

            <div class="player-row">
                <span id="youAreLabel">Jesteś:</span>
                <strong id="playerSymbol">?</strong>
            </div>

            <p id="modeInfo" class="mode-info"></p>
            <p id="chaosInfo" class="chaos-info hidden"></p>
            <p id="firstBloodInfo" class="first-blood-info hidden"></p>
            <button id="firstBloodBtn" class="main-btn power-btn hidden">Użyj Pierwszej krwi</button>
            <p id="status" class="status">Oczekiwanie...</p>

            <div id="classicBoard" class="board classic-board"></div>
            <div id="studentBoard" class="ultimate-board hidden"></div>

            <div id="endPanel" class="end-panel hidden">
                <h2 id="endMessage"></h2>
                <button id="rematchBtn" class="main-btn">Rewanż</button>
                <button id="resetScoreBtn" class="main-btn secondary">Zeruj punkty</button>
            </div>

            <button id="leaveBtn" class="text-btn">Wróć do menu</button>
        </section>

        <div id="gameHelpModal" class="modal hidden">
            <div class="modal-card">
                <div class="modal-head">
                    <h2 id="gameHelpTitle">INSTRUKCJA</h2>
                    <button id="closeGameHelpBtn" class="small-btn">X</button>
                </div>
                <div id="gameHelpText" class="rules"></div>
            </div>
        </div>

        <p id="toast" class="toast hidden"></p>
        <div id="appVersionBadge" class="version-badge">v31.0</div>
    </main>

    <script src="/static/game.js?v=31.0"></script>
    <script src="/static/app-paper-template.js?v=31.0"></script>
    <script src="/static/bot-v27-bridge.js?v=31.0"></script>
    <script src="/static/public-v28-bridge.js?v=31.0"></script>
    <script src="/static/match-chat-v29-bridge.js?v=31.0"></script>
    <script src="/static/student-v30-3-fix.js?v=31.0"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
                    .catch((err) => console.log("Service Worker error:", err));
            });
        }
    </script>
</body>
</html>
